<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apakah Kamu Suka Aku?</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Layar pertanyaan */
        #question-screen {
            text-align: center;
            position: absolute;
            transition: opacity 0.5s ease;
            padding: 0 20px;
        }

        .question-text {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            position: relative;
            height: 80px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #yes-btn {
            background-color: #2ecc71;
            color: white;
        }

        #yes-btn:hover {
            background-color: #27ae60;
            transform: scale(1.1);
        }

        #no-btn {
            background-color: #e74c3c;
            color: white;
            position: relative;
            transition: top 0.15s ease, left 0.15s ease;
        }

        /* Saat tombol mulai "lari", posisinya jadi fixed terhadap viewport */
        #no-btn.fleeing {
            position: fixed;
        }

        /* Layar hasil */
        #result-screen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #111;
            overflow: hidden;
        }

        .center-emoji {
            font-size: 8rem;
            z-index: 10;
            position: relative;
            filter: drop-shadow(0 0 30px red);
            animation: pulse 1s infinite;
        }

        .floating-text {
            position: absolute;
            color: red;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            white-space: nowrap;
            /* rotasi awal & animasi diatur lewat custom properties per elemen */
            transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
            animation: float var(--dur, 3s) var(--delay, 0s) infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% {
                transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) translateY(0px);
                opacity: 0.6;
            }
            50% {
                transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) translateY(-20px);
                opacity: 0.9;
            }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <!-- LAYAR PERTANYAAN -->
    <div id="question-screen">
        <h1 class="question-text">Apakah kamu suka aku?</h1>
        <div class="buttons-container">
            <button class="btn" id="yes-btn">YA</button>
            <button class="btn" id="no-btn">TIDAK</button>
        </div>
    </div>

    <!-- LAYAR HASIL -->
    <div id="result-screen">
        <div class="center-emoji">🖕</div>
        <!-- Teks bertebaran ditambahkan oleh JavaScript -->
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const questionScreen = document.getElementById('question-screen');
        const resultScreen = document.getElementById('result-screen');

        const FLOATING_PHRASES = [
            'YOU LIED', 'NICE TRY DIDDY', 'LOOSER'
        ];

        function dodge() {
            const margin = 20;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const maxX = window.innerWidth - btnWidth - margin;
            const maxY = window.innerHeight - btnHeight - margin;

            const randomX = margin + Math.random() * Math.max(maxX - margin, 0);
            const randomY = margin + Math.random() * Math.max(maxY - margin, 0);

            noBtn.classList.add('fleeing');
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Lari kalau kursor mendekat (desktop)
        noBtn.addEventListener('mouseover', dodge);

        // Lari kalau disentuh (mobile) sebelum tap-nya kena
        noBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            dodge();
        });

        // Klik YA -> tampilkan hasil
        yesBtn.addEventListener('click', function () {
            questionScreen.classList.add('shake');
            questionScreen.style.opacity = '0';

            setTimeout(() => {
                questionScreen.style.display = 'none';
                resultScreen.style.display = 'flex';
                createFloatingTexts();
            }, 500);
        });

        // Acak angka di antara [min, max]
        function randomBetween(min, max) {
            return min + Math.random() * (max - min);
        }

        // Sebar teks merah pakai grid semu biar acak tapi tetap merata,
        // bukan numpuk di satu sisi doang.
        function createFloatingTexts() {
            const cols = 5;
            const rows = 4;
            const cellWidth = 100 / cols;
            const cellHeight = 100 / rows;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    // Lewati beberapa sel secara acak biar nggak terlalu padat & seragam
                    if (Math.random() < 0.25) continue;

                    const textEl = document.createElement('div');
                    textEl.classList.add('floating-text');
                    textEl.innerText = FLOATING_PHRASES[
                        Math.floor(Math.random() * FLOATING_PHRASES.length)
                    ];

                    // Posisi: tengah sel + jitter acak, biar tetap menyebar rapi
                    const baseX = col * cellWidth + cellWidth / 2;
                    const baseY = row * cellHeight + cellHeight / 2;
                    const jitterX = randomBetween(-cellWidth * 0.3, cellWidth * 0.3);
                    const jitterY = randomBetween(-cellHeight * 0.3, cellHeight * 0.3);

                    textEl.style.left = (baseX + jitterX) + '%';
                    textEl.style.top = (baseY + jitterY) + '%';
                    textEl.style.fontSize = randomBetween(1.3, 3) + 'rem';

                    textEl.style.setProperty('--rot', randomBetween(-25, 25) + 'deg');
                    textEl.style.setProperty('--dur', randomBetween(2, 4) + 's');
                    textEl.style.setProperty('--delay', randomBetween(0, 3) + 's');

                    resultScreen.appendChild(textEl);
                }
            }
        }
    </script>

</body>
</html>
