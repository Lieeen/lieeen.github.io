<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apakah Kamu Suka Aku?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Style untuk layar pertanyaan */
        #question-screen {
            text-align: center;
            position: absolute;
            transition: opacity 0.5s ease;
        }

        .question-text {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            position: relative;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #yes-btn {
            background-color: #2ecc71;
            color: white;
        }

        #yes-btn:hover {
            background-color: #27ae60;
            transform: scale(1.1);
        }

        #no-btn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            transition: all 0.1s ease;
        }

        /* Style untuk layar hasil */
        #result-screen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }

        .center-image {
            width: 250px;
            height: auto;
            z-index: 10;
            position: absolute;
            border: 5px solid white;
            box-shadow: 0 0 30px red;
            animation: pulse 1s infinite;
        }

        /* Animasi teks YOU LIED bertebaran */
        .floating-text {
            position: absolute;
            color: red;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            opacity: 0.8;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <!-- LAYAR PERTANYAAN -->
    <div id="question-screen">
        <h1 class="question-text">Apakah kamu suka aku?</h1>
        <div class="buttons-container">
            <button class="btn" id="yes-btn">YA</button>
            <button class="btn" id="no-btn">TIDAK</button>
        </div>
    </div>

    <!-- LAYAR HASIL -->
    <div id="result-screen">
        <img src="https://cdn-icons-png.flaticon.com/512/1023/1023402.png" alt="Middle Finger" class="center-image">
        <!-- Teks akan ditambahkan oleh Javascript -->
    </div>

<script>
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const questionScreen = document.getElementById('question-screen');
    const resultScreen = document.getElementById('result-screen');

    // Tombol TIDAK lari kalau didekati kursor
    noBtn.addEventListener('mouseover', function() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        
        const randomX = Math.random() * (windowWidth - 200);
        const randomY = Math.random() * (windowHeight - 100);
        
        noBtn.style.left = randomX + 'px';
        noBtn.style.top = randomY + 'px';
    });

    // Kalau klik YA, muncul efeknya
    yesBtn.addEventListener('click', function() {
        questionScreen.classList.add('shake');
        questionScreen.style.opacity = '0';
        
        setTimeout(() => {
            questionScreen.style.display = 'none';
            resultScreen.style.display = 'flex';
            createFloatingTexts();
        }, 500);
    });

    // Fungsi bikin tulisan YOU LIED bertebaran
    function createFloatingTexts() {
        const texts = ['YOU LIED', 'BOHONG', 'GA PERCAYA', 'GABISA', 'JANGAN BOHONG'];
        const container = resultScreen;
        
        for(let i = 0; i < 20; i++) { // Bikin 20 teks
            const textEl = document.createElement('div');
            textEl.classList.add('floating-text');
            textEl.innerText = texts[Math.floor(Math.random() * texts.length)];
            
            // Posisi acak
            textEl.style.left = Math.random() * 100 + '%';
            textEl.style.top = Math.random() * 100 + '%';
            textEl.style.fontSize = (Math.random() * 3 + 2) + 'rem'; // Ukuran acak
            textEl.style.animationDelay = Math.random() * 3 + 's';
            
            container.appendChild(textEl);
        }
    }
</script>

</body>
</html>
